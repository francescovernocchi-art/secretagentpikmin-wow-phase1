<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V1.8B Walkthrough — Fullscreen Diorama</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0e14; color: #86efac; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; padding: 1rem; gap: 1rem; }
    h1 { font-size: 1rem; letter-spacing: 0.2em; text-transform: uppercase; }
    .phone { width: min(390px, 100%); border: 2px solid rgba(132,255,159,0.35); border-radius: 1rem; overflow: hidden; background: #000; }
    img { width: 100%; display: block; }
    .caption { padding: 0.5rem 0.75rem; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; border-top: 1px solid rgba(132,255,159,0.2); }
  </style>
</head>
<body>
  <h1>V1.8B · Fullscreen Diorama</h1>
  <div class="phone">
    <img id="frame" src="screenshot-v1-8b-390x844.png" alt="Walkthrough" />
    <div class="caption" id="caption">390×844 — diorama fullscreen</div>
  </div>
  <script>
    const frames = [
      { src: 'screenshot-v1-8b-390x844.png', cap: '390×844 — HUD strip + diorama ≥60%' },
      { src: 'screenshot-v1-8b-430x932.png', cap: '430×932 — navicella nel primo viewport' },
    ];
    let i = 0;
    const img = document.getElementById('frame');
    const cap = document.getElementById('caption');
    setInterval(() => { i = (i + 1) % frames.length; img.src = frames[i].src; cap.textContent = frames[i].cap; }, 3500);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V2.0 Walkthrough — Piazza Centrale Viva</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0e14; color: #86efac; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; padding: 1rem; gap: 1rem; }
    h1 { font-size: 1rem; letter-spacing: 0.2em; text-transform: uppercase; }
    .phone { width: min(430px, 100%); border: 2px solid rgba(132,255,159,0.35); border-radius: 1rem; overflow: hidden; background: #000; }
    img { width: 100%; display: block; }
    .caption { padding: 0.5rem 0.75rem; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; border-top: 1px solid rgba(132,255,159,0.2); }
    .notes { max-width: 430px; font-size: 0.7rem; line-height: 1.5; color: rgba(255,255,255,0.65); padding: 0 0.5rem; }
    .notes li { margin-left: 1rem; margin-bottom: 0.35rem; }
  </style>
</head>
<body>
  <h1>V2.0 · Piazza Centrale Viva</h1>
  <div class="phone">
    <img id="frame" src="screenshot-v2-0-390x844.png" alt="Walkthrough V2.0" />
    <div class="caption" id="caption">390×844 — piazza + traffico Pikmin</div>
  </div>
  <ul class="notes">
    <li>Piazza pavimentata tra hangar e villaggio</li>
    <li>10 Pikmin su rotte Hangar → Piazza → Edifici</li>
    <li>POI: falò, deposito, missioni, antenna, pozzo, ricerca</li>
    <li>Hangar yard espanso — base in costruzione</li>
  </ul>
  <script>
    const frames = [
      { src: 'screenshot-v2-0-390x844.png', cap: '390×844 — cuore colonia + attività' },
      { src: 'screenshot-v2-0-430x932.png', cap: '430×932 — flussi e sentieri usurati' },
    ];
    let i = 0;
    const img = document.getElementById('frame');
    const cap = document.getElementById('caption');
    setInterval(() => { i = (i + 1) % frames.length; img.src = frames[i].src; cap.textContent = frames[i].cap; }, 4000);
  </script>
</body>
</html>
